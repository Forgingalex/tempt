[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"

# Tempo Testnet (Moderato)
[rpc_endpoints]
tempo_testnet = "https://rpc.moderato.tempo.xyz"

[etherscan]
tempo_testnet = { key = "${TEMPO_EXPLORER_API_KEY}", chain = 42431, url = "https://explore.tempo.xyz/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"

# Gas settings for Tempo (higher limits for state creation)
[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.ci.fuzz]
runs = 1000
